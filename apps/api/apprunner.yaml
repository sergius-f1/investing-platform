version: 1.0
runtime: nodejs20
build:
  commands:
    pre-build:
      # Install from the monorepo root so workspace packages (@fedasenka/models) are resolved
      - cd ../../ && npm ci
    build:
      - npm run build
  env:
    - name: NODE_ENV
      value: production
run:
  command: node dist/server.js
  network:
    port: 3001
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    # Set via App Runner console → Configuration → Environment variables:
    # SERVER_API_TOKEN  (secret)
